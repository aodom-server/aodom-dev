name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-resume-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull main on odom-hp
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      HP_DEPLOY_SSH_KEY: ${{ secrets.HP_DEPLOY_SSH_KEY }}
      HP_DEPLOY_COMMAND: ${{ vars.HP_DEPLOY_COMMAND }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Connect to Tailscale with OAuth
        if: env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != ''
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: odom-hp

      - name: Connect to Tailscale with auth key
        if: env.TAILSCALE_AUTHKEY != '' && (env.TS_OAUTH_CLIENT_ID == '' || env.TS_OAUTH_SECRET == '')
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: odom-hp

      - name: Require Tailscale credentials
        if: env.TAILSCALE_AUTHKEY == '' && (env.TS_OAUTH_CLIENT_ID == '' || env.TS_OAUTH_SECRET == '')
        run: |
          echo "Set TS_OAUTH_CLIENT_ID + TS_OAUTH_SECRET, or TAILSCALE_AUTHKEY, in repo/org secrets." >&2
          exit 1

      - name: Require deploy SSH key
        run: |
          if [ -z "$HP_DEPLOY_SSH_KEY" ]; then
            echo "Set HP_DEPLOY_SSH_KEY in repo/org secrets." >&2
            exit 1
          fi

      - name: Install deploy SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HP_DEPLOY_SSH_KEY" > ~/.ssh/hp_deploy
          chmod 600 ~/.ssh/hp_deploy
          ssh-keyscan -H odom-hp >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          deploy_command="${HP_DEPLOY_COMMAND:-$REPOSITORY_NAME}"
          ssh -i ~/.ssh/hp_deploy -o IdentitiesOnly=yes odom-hp@odom-hp "$deploy_command"
